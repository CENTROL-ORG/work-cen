<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEN_WORK | Professional Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg: #f8fafc; --surface: #ffffff; --primary: #0f172a;
            --accent: #3b82f6; --text-sub: #64748b; --success: #10b981;
            --danger: #ef4444; --border: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--primary); padding-bottom: 80px; }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background: var(--surface); display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid var(--border); z-index: 1000;
        }
        .nav-item { flex: 1; text-align: center; font-size: 0.75rem; color: var(--text-sub); font-weight: 600; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .page { display: none; padding: 20px; max-width: 600px; margin: 0 auto; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        .card { background: var(--surface); border-radius: 24px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: 1px solid var(--border); }
        .btn { width: 100%; padding: 15px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; margin-top: 10px; font-size: 0.9rem; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--danger); color: var(--danger); margin-top: 15px; }
        input { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; }
        .task-item { background: white; padding: 18px; border-radius: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        #timer-val { font-size: 4rem; font-weight: 800; text-align: center; margin: 15px 0; letter-spacing: -2px; }
        .payout-live { text-align: center; font-weight: 700; color: var(--success); font-size: 1.4rem; margin-bottom: 20px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="tab-tasks" class="page active">
        <h1 style="margin-bottom:20px">Work Station</h1>
        <div class="card">
            <h2 style="font-size:1rem; margin-bottom:15px">New Task</h2>
            <input type="text" id="t-name" placeholder="Task description...">
            <div style="display:flex; gap:10px">
                <input type="number" id="t-hr" placeholder="Hours">
                <input type="number" id="t-min" placeholder="Minutes">
            </div>
            <button class="btn btn-primary" onclick="addPending()">Add to Pending</button>
        </div>
        <h2 style="font-size:0.9rem; color:var(--text-sub); text-transform:uppercase; margin: 20px 0 10px 5px;">Pending Queue</h2>
        <div id="pending-list"></div>
    </div>

    <div id="tab-ongoing" class="page">
        <h1>Ongoing Work</h1>
        <div class="card" id="ongoing-content">
            <p style="text-align:center; color:var(--text-sub); padding:40px 0;">No active tasks found in the system.</p>
        </div>
    </div>

    <div id="tab-report" class="page">
        <h1>Attendance</h1>
        <div class="card" id="att-box" style="text-align:center; padding:30px;">
            <h3 id="current-time-display">00:00:00</h3>
            <p id="att-text" style="font-weight:700; margin-top:10px">Status: STANDBY</p>
        </div>
        <div style="display:flex; gap:10px">
            <button class="btn btn-success" onclick="attendance('IN')">Clock In</button>
            <button class="btn btn-danger" onclick="attendance('OUT')">Clock Out</button>
        </div>
        <div id="attendance-logs" style="margin-top:20px"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showTab('tasks')">Tasks</div>
        <div class="nav-item" onclick="showTab('ongoing')">Ongoing</div>
        <div class="nav-item" onclick="showTab('report')">Report</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDL7CPrwuAw-BrIPHQuNtydc1h1g73sFVk",
            authDomain: "centrol-bank.firebaseapp.com",
            databaseURL: "https://centrol-bank-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "centrol-bank"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userRef = db.ref('users/pranshi_main');

        let timerInt;
        const CEN_RATE_MIN = 350/60;

        function showTab(tabId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        setInterval(() => {
            document.getElementById('current-time-display').innerText = new Date().toLocaleTimeString();
        }, 1000);

        async function addPending() {
            const name = document.getElementById('t-name').value;
            const hr = parseInt(document.getElementById('t-hr').value) || 0;
            const min = parseInt(document.getElementById('t-min').value) || 0;
            if(!name) return;
            const totalMins = (hr * 60) + min;
            await userRef.child('pending').push({ name, totalMins });
            document.getElementById('t-name').value = '';
        }

        userRef.child('pending').on('value', snap => {
            const list = document.getElementById('pending-list');
            list.innerHTML = '';
            const data = snap.val();
            if(!data) return;
            Object.keys(data).forEach(id => {
                const t = data[id];
                list.innerHTML += `
                    <div class="task-item">
                        <div><b>${t.name}</b><br><small>${t.totalMins}m deadline</small></div>
                        <button onclick="startOngoing('${id}')" style="background:var(--accent); color:white; border:none; padding:10px 18px; border-radius:10px; font-weight:700">START</button>
                    </div>`;
            });
        });

        async function startOngoing(id) {
            const snap = await userRef.child('pending/' + id).get();
            const task = snap.val();
            const ongoingTask = { ...task, startTime: Date.now() };
            await userRef.child('ongoing_active').set(ongoingTask);
            await userRef.child('pending/' + id).remove();
            showTab('ongoing');
        }

        userRef.child('ongoing_active').on('value', snap => {
            const activeTask = snap.val();
            const container = document.getElementById('ongoing-content');
            clearInterval(timerInt);

            if(!activeTask) {
                container.innerHTML = '<p style="text-align:center; color:var(--text-sub); padding:40px 0;">No active tasks.</p>';
                return;
            }

            timerInt = setInterval(() => {
                const elapsedSecs = Math.floor((Date.now() - activeTask.startTime) / 1000);
                const elapsedMins = elapsedSecs / 60;
                const h = Math.floor(elapsedSecs / 3600).toString().padStart(2, '0');
                const m = Math.floor((elapsedSecs % 3600) / 60).toString().padStart(2, '0');
                const s = (elapsedSecs % 60).toString().padStart(2, '0');
                const payout = calculatePayout(activeTask.totalMins, elapsedMins);

                container.innerHTML = `
                    <h2 style="text-align:center">${activeTask.name}</h2>
                    <div id="timer-val">${h}:${m}:${s}</div>
                    <div class="payout-live">CEN ${payout.toFixed(2)}</div>
                    <button class="btn btn-success" onclick="completeTask()">FINISH & CLAIM</button>
                    <button class="btn btn-outline" onclick="terminateTask()">TERMINATE (NO PAY)</button>
                `;
            }, 1000);
        });

        function calculatePayout(assigned, actual) {
            const base = assigned * CEN_RATE_MIN;
            if (actual <= assigned * 0.85) return actual * CEN_RATE_MIN;
            if (actual <= assigned + 60) return base;
            const overtime = actual - (assigned + 60);
            const deductions = Math.floor(overtime / 30) + 1;
            return Math.max(0, base - (base * 0.15 * deductions));
        }

        async function completeTask() {
            const snapActive = await userRef.child('ongoing_active').get();
            const activeTask = snapActive.val();
            const elapsedMins = (Date.now() - activeTask.startTime) / 60000;
            const finalPay = calculatePayout(activeTask.totalMins, elapsedMins);
            const snapBal = await userRef.child('balance').get();
            const currentBal = snapBal.val() || 0;

            await userRef.update({ balance: currentBal + finalPay });
            await userRef.child('history').push({
                amount: finalPay, description: "Work: " + activeTask.name,
                timestamp: new Date().toLocaleString(), type: "CREDIT"
            });
            await userRef.child('ongoing_active').remove();
            alert("Funds Transferred!");
        }

        async function terminateTask() {
            if(confirm("Terminate task? This will result in 0 CEN payout and no records.")) {
                await userRef.child('ongoing_active').remove();
            }
        }

        async function attendance(type) {
            await userRef.child('attendance_logs').push({
                type, time: new Date().toLocaleTimeString(), date: new Date().toLocaleDateString()
            });
            document.getElementById('att-text').innerText = "Status: " + (type === 'IN' ? 'ON DUTY' : 'OFF DUTY');
        }
    </script>
</body>
</html>
