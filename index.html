<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEN_WORK | Professional Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg: #f4f7f9;
            --surface: #ffffff;
            --primary: #1e293b;
            --accent: #3b82f6;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
            --shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1000px; animation: fadeIn 0.5s ease; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }

        .card { background: var(--surface); border-radius: 20px; padding: 25px; box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.02); }
        h2 { font-size: 1.2rem; margin-bottom: 20px; color: var(--primary); display: flex; align-items: center; gap: 10px; }

        /* Form Styling */
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: var(--text-sub); margin-bottom: 5px; font-weight: 600; }
        input, select, textarea { 
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; 
            font-size: 0.9rem; outline: none; transition: border 0.2s;
        }
        input:focus { border-color: var(--accent); }

        /* Timer Logic UI */
        .active-task-box { 
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%); 
            border: 2px solid var(--accent); position: relative;
        }
        #timer-display { font-size: 3.5rem; font-weight: 800; color: var(--primary); margin: 15px 0; font-variant-numeric: tabular-nums; }
        .btn { 
            padding: 12px 24px; border-radius: 12px; border: none; cursor: pointer; 
            font-weight: 700; transition: all 0.2s; width: 100%; font-size: 0.9rem;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-stop { background: var(--danger); color: white; margin-top: 10px; }

        /* Status Badges */
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-ongoing { background: #dbeafe; color: #1e40af; }

        /* Log Book */
        .log-item { 
            display: flex; justify-content: space-between; padding: 12px; 
            border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; 
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="font-weight: 800; letter-spacing: -1px;">CEN_WORK</h1>
            <p style="color: var(--text-sub); font-size: 0.9rem;">Rate: 350 CEN/HR</p>
        </div>
        <div id="streak-counter" class="card" style="padding: 10px 20px; border-radius: 50px; font-weight: 700; color: var(--accent);">
            🔥 0 Day Streak
        </div>
    </header>

    <div class="grid">
        <!-- Task Assignment -->
        <div class="card">
            <h2>Assign New Task</h2>
            <div class="input-group">
                <label>Task Description</label>
                <input type="text" id="task-name" placeholder="e.g. Backend API Development">
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 1;">
                    <label>Hours</label>
                    <input type="number" id="task-hr" value="1" min="0">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Minutes</label>
                    <input type="number" id="task-min" value="0" min="0" max="59">
                </div>
            </div>
            <button class="btn btn-primary" onclick="startTask()">Start Ongoing Task</button>
        </div>

        <!-- Active Timer -->
        <div class="card active-task-box" id="timer-card">
            <span class="badge badge-ongoing" id="status-label">System Idle</span>
            <h2 id="current-task-title" style="margin-top: 10px;">No Active Work</h2>
            <div id="timer-display">00:00:00</div>
            <div id="live-payout" style="font-weight: 600; color: var(--success); margin-bottom: 15px;">Estimated Payout: CEN 0.00</div>
            <button class="btn btn-stop" id="stop-btn" style="display: none;" onclick="stopTask()">Complete & Secure Funds</button>
        </div>

        <!-- Logs & Pending -->
        <div class="card" style="grid-column: span 2;">
            <h2>Work Log & Payout History</h2>
            <div id="log-book">
                <p style="color: var(--text-sub); font-size: 0.9rem;">No work recorded for this session.</p>
            </div>
        </div>
    </div>
</div>

<script>
    // FIREBASE CONFIG (Same as Bank)
    const firebaseConfig = {
        apiKey: "AIzaSyDL7CPrwuAw-BrIPHQuNtydc1h1g73sFVk",
        authDomain: "centrol-bank.firebaseapp.com",
        databaseURL: "https://centrol-bank-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "centrol-bank"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let timerInterval;
    let startTime;
    let assignedMinutes = 0;
    let isRunning = false;
    const CEN_RATE_PER_MIN = 350 / 60;

    function startTask() {
        const name = document.getElementById('task-name').value;
        const hr = parseInt(document.getElementById('task-hr').value) || 0;
        const min = parseInt(document.getElementById('task-min').value) || 0;
        
        if (!name) return alert("Enter task detail");
        
        assignedMinutes = (hr * 60) + min;
        if (assignedMinutes <= 0) return alert("Set a valid deadline");

        startTime = new Date();
        isRunning = true;
        
        document.getElementById('current-task-title').innerText = name;
        document.getElementById('status-label').innerText = "Ongoing";
        document.getElementById('stop-btn').style.display = "block";
        
        timerInterval = setInterval(updateUI, 1000);
    }

    function updateUI() {
        const now = new Date();
        const diff = Math.floor((now - startTime) / 1000);
        
        const h = Math.floor(diff / 3600).toString().padStart(2, '0');
        const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
        const s = (diff % 60).toString().padStart(2, '0');
        
        document.getElementById('timer-display').innerText = `${h}:${m}:${s}`;
        
        // Live Payout Logic
        const currentMins = diff / 60;
        const payout = calculateMoney(assignedMinutes, currentMins);
        document.getElementById('live-payout').innerText = `Estimated Payout: CEN ${payout.toFixed(2)}`;
    }

    function calculateMoney(assigned, actual) {
        const baseMoney = assigned * CEN_RATE_PER_MIN;
        
        // 1st Logic: Under 85% of time
        if (actual <= assigned * 0.85) {
            return actual * CEN_RATE_PER_MIN;
        }
        
        // 2nd Logic: Exceed 85% but under 100% + 1hr
        if (actual <= assigned + 60) {
            return baseMoney;
        }
        
        // 3rd Logic: Exceed 100% + 1hr (Penalty)
        const penaltyBuffer = assigned + 60;
        if (actual > penaltyBuffer) {
            const overtime = actual - penaltyBuffer;
            const deductionUnits = Math.floor(overtime / 30) + 1; // 15% immediately, then every 30m
            const totalDeduction = (baseMoney * 0.15) * deductionUnits;
            return Math.max(0, baseMoney - totalDeduction);
        }
        return 0;
    }

    async function stopTask() {
        clearInterval(timerInterval);
        const now = new Date();
        const actualMins = (now - startTime) / 60000;
        const finalPayout = calculateMoney(assignedMinutes, actualMins);
        const taskName = document.getElementById('current-task-title').innerText;

        // 1. Update Firebase Balance
        const userRef = db.ref('users/pranshi_main');
        const snapshot = await userRef.child('balance').get();
        const currentBal = snapshot.val() || 0;
        
        await userRef.update({
            balance: currentBal + finalPayout
        });

        // 2. Log Transaction to Bank History
        const logRef = userRef.child('history').push();
        await logRef.set({
            amount: finalPayout,
            description: `Work: ${taskName}`,
            timestamp: now.toLocaleString(),
            type: 'CREDIT'
        });

        // 3. Log Work Details
        const workLogRef = userRef.child('work_logs').push();
        await workLogRef.set({
            task: taskName,
            assigned: assignedMinutes,
            actual: actualMins.toFixed(2),
            payout: finalPayout,
            date: now.toISOString().split('T')[0]
        });

        // Reset UI
        alert(`Task Complete! CEN ${finalPayout.toFixed(2)} added to Central Bank.`);
        location.reload();
    }

    // Load Logs
    db.ref('users/pranshi_main/work_logs').limitToLast(5).on('value', snap => {
        const logs = snap.val();
        if(!logs) return;
        let html = '';
        Object.values(logs).reverse().forEach(l => {
            html += `<div class="log-item">
                <span><b>${l.task}</b><br><small>${l.date}</small></span>
                <span>${l.actual}m / ${l.assigned}m</span>
                <span style="color:var(--success); font-weight:700">+${l.payout.toFixed(2)}</span>
            </div>`;
        });
        document.getElementById('log-book').innerHTML = html;
    });
</script>
</body>
</html>
